<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Al Hikmah Attendance</title>
    <link rel="stylesheet" href="styles.css?v=20260605-mobile-nav-polish" />
    <link rel="stylesheet" href="mobile-nav.css?v=20260605-mobile-nav-polish" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      defer
    ></script>
    <script src="app.js?v=20260605-mobile-nav-polish" defer></script>
  </head>
  <body>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <main id="auth" class="auth-shell">
      <section class="auth-panel">
        <div class="login-brand">
          <div class="logo-mark">✥</div>
          <strong>EduAttend Pro</strong>
        </div>
        <div class="login-copy">
          <h1>Selamat Datang</h1>
          <p>Silakan masuk untuk melanjutkan akses absensi.</p>
        </div>
        <form id="setup-form" class="hidden">
          <h2>Setup Administrator</h2>
          <label>Nama Sekolah <input name="schoolName" required /></label>
          <label>Nama Administrator <input name="name" required /></label>
          <label>Email <input name="email" type="email" required /></label>
          <label
            >Password
            <input name="password" type="password" minlength="6" required
          /></label>
          <button class="primary" type="submit">Buat Administrator</button>
        </form>
        <form id="login-form" class="hidden">
          <label class="field-label"
            >Pilih Peran
            <select name="role" required>
              <option value="super_admin">Administrator</option>
              <option value="guru">Guru</option>
              <option value="wali_kelas">Wali Kelas</option>
              <option value="kepala_sekolah">Kepala Sekolah</option>
              <option value="siswa">Siswa</option>
            </select>
          </label>
          <label class="field-label"
            ><span id="login-id-label">Email / NIP / NISN</span
            ><span class="input-icon user-icon"
              ><input
                id="login-identifier"
                name="email"
                type="text"
                placeholder="Masukkan Email, NIP, atau NISN"
                required /></span
          ></label>
          <label class="field-label" id="login-password-field"
            >Kata Sandi <a href="#" class="forgot-link">Lupa Kata Sandi?</a
            ><span class="input-icon lock-icon"
              ><input
                id="login-password"
                name="password"
                type="password"
                placeholder="Masukkan kata sandi" /></span
          ></label>
          <button class="primary login-button" type="submit">
            Masuk <span>↪</span>
          </button>
          <div class="login-help">
            Kesulitan masuk? Hubungi <strong>Pusat Bantuan</strong>
          </div>
        </form>
        <footer class="login-footer">
          <span>v2.4.0</span>
          <small>© 2027 Yayasan Pendidikan Nasional</small>
          <nav>Privacy Policy&nbsp;&nbsp;&nbsp; Terms of Service</nav>
        </footer>
      </section>
    </main>

    <div id="app" class="app hidden">
      <aside class="sidebar">
        <div class="brand">
          <strong>EduAttend Pro</strong>
          <span>School Attendance</span>
        </div>
        <nav id="menu"></nav>
        <button id="logout" class="ghost">Keluar</button>
      </aside>
      <section class="workspace">
        <header class="topbar">
          <div id="mobile-school-bar" class="mobile-school-bar"></div>
          <button id="menu-toggle" class="icon-btn" aria-label="Menu">
            ☰
          </button>
          <div>
            <h1 id="page-title">Dashboard</h1>
            <p id="page-subtitle" class="muted"></p>
          </div>
          <div id="quick-tools" class="quick-tools"></div>
          <div class="user-pill">
            <span id="active-role"></span>
            <strong id="active-user"></strong>
          </div>
        </header>
        <section id="view" class="content"></section>
      </section>
    </div>

    <template id="table-template">
      <section class="panel">
        <div class="panel-head">
          <div>
            <h2></h2>
            <p class="muted"></p>
          </div>
          <div class="actions"></div>
        </div>
        <div class="filters"></div>
        <div class="table-wrap">
          <table>
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="pager"></div>
      </section>
    </template>
  </body>
</html>
